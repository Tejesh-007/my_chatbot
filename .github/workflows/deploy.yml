# Workflow for building and deploying a React app to GitHub Pages
name: Deploy React App to Pages

on:
  # Runs on pushes targeting the main branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Grant permissions for the workflow to read contents, write to pages, and get an OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node.js version
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend # Run command in the frontend folder

      - name: Build React application
        run: npm run build
        working-directory: ./frontend # Run command in the frontend folder

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload production-ready build files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/build # Path to the build output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
